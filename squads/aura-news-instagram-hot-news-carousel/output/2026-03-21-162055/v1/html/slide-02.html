<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1350" />
  <link rel="stylesheet" href="slide-base.css" />
</head>
<body>
  <div class="slide">
    <div
      class="slide-photo"
      style="background-image: url('https://images.unsplash.com/photo-1558494949-ef010cbdcc31?auto=format&fit=crop&w=1200&h=1500&q=85');"
      aria-hidden="true"
    ></div>
    <span class="slide-number">02 / 08</span>
    <div class="slide-inner">
      <div class="brand-top">Aura News</div>
      <div class="visual-spacer" aria-hidden="true"></div>
      <div class="text-panel">
        <h1 class="title">O que está em <span class="accent">discussão</span></h1>
        <p class="body">
          A ideia não é "mais um chat". É um arranjo em que modelos podem planejar etapas, buscar informação e produzir análise com menos intervenção humana em cada passo. Ainda é tecnologia em evolução, não produto acabado na sua mesa.
        </p>
        <div class="handle">@auranews.ai</div>
      </div>
    </div>
  </div>
</body>
</html>
