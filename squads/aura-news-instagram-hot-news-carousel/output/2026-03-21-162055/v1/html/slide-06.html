<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1350" />
  <link rel="stylesheet" href="slide-base.css" />
</head>
<body>
  <div class="slide">
    <div
      class="slide-photo"
      style="background-image: url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1200&h=1500&q=85');"
      aria-hidden="true"
    ></div>
    <span class="slide-number">06 / 08</span>
    <div class="slide-inner">
      <div class="brand-top">Aura News</div>
      <div class="visual-spacer" aria-hidden="true"></div>
      <div class="text-panel">
        <h1 class="title">O que <span class="accent">observar</span> daqui pra frente</h1>
        <p class="body">
          Transparência sobre avaliações, trilhas de auditoria, citação de fontes e regras de uso em ambientes profissionais. Esses sinais separam demonstração de produto real.
        </p>
        <div class="handle">@auranews.ai</div>
      </div>
    </div>
  </div>
</body>
</html>
