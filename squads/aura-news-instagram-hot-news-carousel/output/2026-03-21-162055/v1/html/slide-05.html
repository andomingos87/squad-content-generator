<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1350" />
  <link rel="stylesheet" href="slide-base.css" />
</head>
<body>
  <div class="slide">
    <div
      class="slide-photo"
      style="background-image: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1200&h=1500&q=85');"
      aria-hidden="true"
    ></div>
    <span class="slide-number">05 / 08</span>
    <div class="slide-inner">
      <div class="brand-top">Aura News</div>
      <div class="visual-spacer" aria-hidden="true"></div>
      <div class="text-panel">
        <h1 class="title">Limite que <span class="accent">importa</span></h1>
        <p class="body">
          Autonomia não é infalibilidade. Erro em cadeia, viés e "confiança demais" continuam sendo riscos. Quem usa precisa manter verificação, fontes e responsabilidade humana no resultado final.
        </p>
        <div class="handle">@auranews.ai</div>
      </div>
    </div>
  </div>
</body>
</html>
