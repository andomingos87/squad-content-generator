<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1350" />
  <link rel="stylesheet" href="slide-base.css" />
</head>
<body>
  <div class="slide">
    <div
      class="slide-photo"
      style="background-image: url('https://images.unsplash.com/photo-1573164713988-8665fc963095?auto=format&fit=crop&w=1200&h=1500&q=85');"
      aria-hidden="true"
    ></div>
    <span class="slide-number">04 / 08</span>
    <div class="slide-inner">
      <div class="brand-top">Aura News</div>
      <div class="visual-spacer" aria-hidden="true"></div>
      <div class="text-panel">
        <h1 class="title">Por que isso <span class="accent">importa</span></h1>
        <p class="body">
          Para quem estuda e trabalha com informação, muda o custo de produzir revisões, resumos e comparações. Para empresas, muda onde vale investir tempo humano: revisão, ética e decisão, não digitação.
        </p>
        <div class="handle">@auranews.ai</div>
      </div>
    </div>
  </div>
</body>
</html>
