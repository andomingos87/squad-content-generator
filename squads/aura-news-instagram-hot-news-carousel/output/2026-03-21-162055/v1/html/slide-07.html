<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1350" />
  <link rel="stylesheet" href="slide-base.css" />
</head>
<body>
  <div class="slide">
    <div
      class="slide-photo"
      style="background-image: url('https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1200&h=1500&q=85');"
      aria-hidden="true"
    ></div>
    <span class="slide-number">07 / 08</span>
    <div class="slide-inner">
      <div class="brand-top">Aura News</div>
      <div class="visual-spacer" aria-hidden="true"></div>
      <div class="text-panel">
        <h1 class="title">Em <span class="accent">uma frase</span></h1>
        <p class="body">
          A disputa agora é quem entrega pesquisa confiável com governança — não apenas velocidade.
        </p>
        <div class="handle">@auranews.ai</div>
      </div>
    </div>
  </div>
