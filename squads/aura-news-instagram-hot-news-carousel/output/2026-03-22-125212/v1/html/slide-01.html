<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, height=1350" />
  <link rel="stylesheet" href="slide-base.css" />
</head>
<body>
  <div class="slide slide--cover">
    <div class="slide-photo" style="background-image: url('https://images.unsplash.com/photo-1560958089-b8a1929cea89?auto=format&fit=crop&w=1200&h=1500&q=85&fm=jpg');" aria-hidden="true"></div>
    <div class="slide-inner">
      <div class="brand-top">Aura News</div>
      <div class="visual-spacer" aria-hidden="true"></div>
      <div class="text-panel">
        <h1 class="title">Uber aposta <span class="accent">US$ 1,25 BI</span> em carros <span class="accent">sem motorista</span>. O que muda para você?</h1>
        <p class="lead">Acordo com a Rivian coloca dezenas de milhares de robotáxis no horizonte. A corrida autônoma saiu do laboratório.</p>
        <div class="handle">@auranews.ai</div>
        <div class="swipe-hint">Deslize para mais →</div>
      </div>
    </div>
  </div>
</body>
</html>
